<!-- Path: GeneralWebApi/Frontend/general-frontend/src/app/features/employees/add-employee/add-employee.component.html -->
<div class="add-employee-container">
  <div class="form-section">
    <app-base-card
      [title]="'employees.add.cardTitle' | translate"
      [icon]="'person_add'"
      [variant]="'elevated'"
    >
      <div class="form-container">
        <app-base-form
          [config]="formConfig"
          [formData]="formData"
          [loading]="loading()"
          [fieldLoading]="fieldLoading()"
          (formSubmit)="onFormSubmit($event)"
          (formCancel)="onFormCancel()"
          (fieldDropdownOpen)="onFieldDropdownOpen($event.key)"
        >
        </app-base-form>
      </div>
    </app-base-card>
  </div>
</div>
