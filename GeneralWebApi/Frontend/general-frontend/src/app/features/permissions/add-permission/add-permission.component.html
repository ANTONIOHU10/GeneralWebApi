<div class="add-permission-container">
  <div class="form-section">
    <app-base-card
      [title]="'permissions.add.cardTitle' | translate"
      [icon]="'lock'"
      [variant]="'elevated'"
    >
      <div class="form-container">
        <app-base-form
          [config]="formConfig"
          [formData]="formData"
          [loading]="loading()"
          (formSubmit)="onFormSubmit($event)"
          (formCancel)="onFormCancel()"
        ></app-base-form>
      </div>
    </app-base-card>
  </div>
</div>
