<div class="add-position-container">
  <div class="form-section">
    <app-base-card
      [title]="'positions.add.cardTitle' | translate"
      [icon]="'work'"
      [variant]="'elevated'"
    >
      <div class="form-container">
        <app-base-form
          [config]="formConfig"
          [formData]="formData"
          [loading]="loading"
          (formSubmit)="onFormSubmit($event)"
          (formCancel)="onFormCancel()"
        ></app-base-form>
      </div>
    </app-base-card>
  </div>
</div>
