<!-- Path: GeneralWebApi/Frontend/general-frontend/src/app/features/roles/add-role/add-role.component.html -->
<div class="add-role-container">
  <div class="form-section">
    <app-base-card
      [title]="'roles.add.cardTitle' | translate"
      [icon]="'admin_panel_settings'"
      [variant]="'elevated'"
    >
      <div class="form-container">
        <app-base-form
          [config]="formConfig"
          [formData]="formData"
          [loading]="loading()"
          [fieldLoading]="fieldLoading"
          (formSubmit)="onFormSubmit($event)"
          (formCancel)="onFormCancel()"
          (fieldDropdownOpen)="onFieldDropdownOpen($event)"
        ></app-base-form>
      </div>
    </app-base-card>
  </div>
</div>
