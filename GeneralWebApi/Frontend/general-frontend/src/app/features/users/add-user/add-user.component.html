<!-- Path: GeneralWebApi/Frontend/general-frontend/src/app/features/users/add-user/add-user.component.html -->
<div class="add-user-container">
  <div class="form-section">
    <app-base-card
      [title]="'users.add.cardTitle' | translate"
      [icon]="'person_add'"
      [variant]="'elevated'"
    >
      <div class="form-container">
        <app-base-form
          [config]="formConfig"
          [formData]="formData"
          [loading]="loading()"
          [fieldLoading]="fieldLoading"
          (formSubmit)="onFormSubmit($event)"
          (formCancel)="onFormCancel()"
          (fieldDropdownOpen)="onFieldDropdownOpen($event)"
        ></app-base-form>
      </div>
    </app-base-card>
  </div>
</div>
